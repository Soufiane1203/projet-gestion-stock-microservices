<div class="container">
  <div class="header">
    <h1>Gestion des Commandes</h1>
    <button mat-raised-button color="primary" (click)="openDialog()" *ngIf="isAdmin">
      <mat-icon>add</mat-icon>
      Créer une commande
    </button>
    <button mat-raised-button color="accent" (click)="openSupplyRequestDialog()" *ngIf="!isAdmin">
      <mat-icon>assignment</mat-icon>
      Demander un approvisionnement
    </button>
  </div>

  <mat-chip color="primary" selected class="readonly-chip" *ngIf="!isAdmin">
    Mode lecture seule
  </mat-chip>

  <mat-card>
    <table mat-table [dataSource]="orders" class="full-width-table">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let order">{{ order.id }}</td>
      </ng-container>

      <ng-container matColumnDef="productId">
        <th mat-header-cell *matHeaderCellDef>Produit</th>
        <td mat-cell *matCellDef="let order">{{ getProductName(order.productId) }}</td>
      </ng-container>

      <ng-container matColumnDef="supplierId">
        <th mat-header-cell *matHeaderCellDef>Fournisseur</th>
        <td mat-cell *matCellDef="let order">{{ getSupplierName(order.supplierId) }}</td>
      </ng-container>

      <ng-container matColumnDef="quantity">
        <th mat-header-cell *matHeaderCellDef>Quantité</th>
        <td mat-cell *matCellDef="let order">{{ order.quantity }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Statut</th>
        <td mat-cell *matCellDef="let order">
          <span [class]="'status-' + order.status?.toLowerCase()">
            {{ order.status }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let order">
          <button mat-icon-button color="primary" (click)="openDialog(order)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteOrder(order.id!)">
            <mat-icon>delete</mat-icon>
          </button>
          <button mat-icon-button color="accent" (click)="approveRequest(order)" *ngIf="order.status === pendingStatus">
            <mat-icon>check_circle</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="rejectRequest(order)" *ngIf="order.status === pendingStatus">
            <mat-icon>cancel</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card>
</div>
