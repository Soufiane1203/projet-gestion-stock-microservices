<h2 mat-dialog-title>{{ isEdit ? 'Modifier' : 'Créer' }} une commande</h2>
<mat-dialog-content>
  <form [formGroup]="orderForm">
    <mat-form-field class="full-width">
      <mat-label>Produit</mat-label>
      <mat-select formControlName="productId" required>
        <mat-option *ngFor="let product of products" [value]="product.id">
          {{ product.name }} ({{ product.sku }})
        </mat-option>
      </mat-select>
      <mat-error *ngIf="orderForm.get('productId')?.hasError('required')">
        Le produit est requis
      </mat-error>
    </mat-form-field>

    <mat-form-field class="full-width">
      <mat-label>Fournisseur</mat-label>
      <mat-select formControlName="supplierId" required>
        <mat-option *ngFor="let supplier of suppliers" [value]="supplier.id">
          {{ supplier.name }}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="orderForm.get('supplierId')?.hasError('required')">
        Le fournisseur est requis
      </mat-error>
    </mat-form-field>

    <mat-form-field class="full-width">
      <mat-label>Quantité</mat-label>
      <input matInput type="number" formControlName="quantity" required>
      <mat-error *ngIf="orderForm.get('quantity')?.hasError('required')">
        La quantité est requise
      </mat-error>
    </mat-form-field>

    <mat-form-field class="full-width" *ngIf="isEdit">
      <mat-label>Statut</mat-label>
      <mat-select formControlName="status">
        <mat-option value="CREATED">Créée</mat-option>
        <mat-option value="CONFIRMED">Confirmée</mat-option>
        <mat-option value="CANCELLED">Annulée</mat-option>
        <mat-option value="PENDING_APPROVAL">En attente validation</mat-option>
      </mat-select>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button (click)="onCancel()">Annuler</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="orderForm.invalid">
    {{ isEdit ? 'Modifier' : 'Créer' }}
  </button>
</mat-dialog-actions>
