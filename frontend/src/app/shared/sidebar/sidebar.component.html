<mat-nav-list>
  <a mat-list-item routerLink="/dashboard" routerLinkActive="active" *ngIf="authService.isAuthenticated()">
    <mat-icon>dashboard</mat-icon>
    <span>Dashboard</span>
  </a>

  <a mat-list-item routerLink="/products" routerLinkActive="active" *ngIf="authService.isAdmin()">
    <mat-icon>inventory</mat-icon>
    <span>Produits</span>
  </a>

  <a mat-list-item routerLink="/suppliers" routerLinkActive="active" *ngIf="authService.isAdmin()">
    <mat-icon>local_shipping</mat-icon>
    <span>Fournisseurs</span>
  </a>

  <a mat-list-item routerLink="/orders" routerLinkActive="active" *ngIf="authService.isAuthenticated() && !authService.isSupplier()">
    <mat-icon>shopping_cart</mat-icon>
    <span>Commandes</span>
  </a>

  <a mat-list-item routerLink="/supplier-orders" routerLinkActive="active" *ngIf="authService.isSupplier()">
    <mat-icon>assignment</mat-icon>
    <span>Mes Commandes</span>
  </a>

  <a mat-list-item routerLink="/stocks" routerLinkActive="active" *ngIf="authService.isAuthenticated() && !authService.isSupplier()">
    <mat-icon>warehouse</mat-icon>
    <span>Stocks</span>
  </a>

  <a mat-list-item routerLink="/notifications" routerLinkActive="active" *ngIf="authService.isAuthenticated() && !authService.isSupplier()">
    <mat-icon>notifications</mat-icon>
    <span>Notifications</span>
  </a>
</mat-nav-list>
