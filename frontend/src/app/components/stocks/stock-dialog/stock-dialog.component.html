<h2 mat-dialog-title>{{ isEdit ? 'Modifier' : 'Ajouter' }} un stock</h2>
<mat-dialog-content>
  <form [formGroup]="stockForm">
    <mat-form-field class="full-width">
      <mat-label>Produit</mat-label>
      <mat-select formControlName="productId" required>
        <mat-option *ngFor="let product of products" [value]="product.id">
          {{ product.name }} ({{ product.sku }})
        </mat-option>
      </mat-select>
      <mat-error *ngIf="stockForm.get('productId')?.hasError('required')">
        Le produit est requis
      </mat-error>
    </mat-form-field>

    <mat-form-field class="full-width">
      <mat-label>Quantité</mat-label>
      <input matInput type="number" formControlName="quantity" required>
      <mat-error *ngIf="stockForm.get('quantity')?.hasError('required')">
        La quantité est requise
      </mat-error>
    </mat-form-field>

    <mat-form-field class="full-width">
      <mat-label>Seuil Critique</mat-label>
      <input matInput type="number" formControlName="criticalThreshold" required>
      <mat-error *ngIf="stockForm.get('criticalThreshold')?.hasError('required')">
        Le seuil critique est requis
      </mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button (click)="onCancel()">Annuler</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="stockForm.invalid">
    {{ isEdit ? 'Modifier' : 'Créer' }}
  </button>
</mat-dialog-actions>
