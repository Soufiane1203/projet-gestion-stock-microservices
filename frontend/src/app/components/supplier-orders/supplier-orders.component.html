<div class="container">
  <h1>Mes Commandes Fournisseur</h1>
  
  <mat-card class="info-banner" *ngIf="supplierId">
    <mat-icon>store</mat-icon>
    <div>
      <p><strong>Fournisseur ID:</strong> {{ supplierId }}</p>
      <small>Vous consultez les commandes qui vous sont assignées.</small>
    </div>
  </mat-card>

  <mat-card>
    <mat-card-content>
      <table mat-table [dataSource]="orders" class="mat-elevation-z0">
        
        <!-- ID Column -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let order">{{ order.id }}</td>
        </ng-container>

        <!-- Product ID Column -->
        <ng-container matColumnDef="productId">
          <th mat-header-cell *matHeaderCellDef>Produit ID</th>
          <td mat-cell *matCellDef="let order">{{ order.productId }}</td>
        </ng-container>

        <!-- Quantity Column -->
        <ng-container matColumnDef="quantity">
          <th mat-header-cell *matHeaderCellDef>Quantité</th>
          <td mat-cell *matCellDef="let order">{{ order.quantity }}</td>
        </ng-container>

        <!-- Status Column -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Statut</th>
          <td mat-cell *matCellDef="let order">
            <mat-chip [ngClass]="getStatusClass(order.status)">
              {{ order.status }}
            </mat-chip>
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let order">
            <button mat-icon-button [matMenuTriggerFor]="statusMenu" 
                    *ngIf="canUpdateStatus(order)"
                    matTooltip="Mettre à jour le statut">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #statusMenu="matMenu">
              <button mat-menu-item *ngFor="let status of statusOptions" 
                      (click)="updateStatus(order, status)"
                      [disabled]="order.status === status">
                {{ status }}
              </button>
            </mat-menu>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <div *ngIf="orders.length === 0" class="no-data">
        <mat-icon>inbox</mat-icon>
        <p>Aucune commande trouvée pour ce fournisseur.</p>
      </div>
    </mat-card-content>
  </mat-card>
</div>
