server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configs

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: dev
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configs

---
spring:
  config:
    activate:
      on-profile: prod
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configs


