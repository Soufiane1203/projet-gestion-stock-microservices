server:
  port: 8085

spring:
  application:
    name: notification-service
  profiles:
    active: dev
  config:
    import: optional:configserver:http://localhost:8888
  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: prod
  kafka:
    bootstrap-servers: localhost:9092


