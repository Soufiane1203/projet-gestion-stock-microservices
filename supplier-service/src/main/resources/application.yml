server:
  port: 8082
  error:
    include-message: always
    include-stacktrace: always

spring:
  application:
    name: supplier-service
  profiles:
    active: dev
  config:
    import: optional:configserver:http://localhost:8888
  # Configuration PostgreSQL (compatible DBeaver)
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  file:
    name: logs/supplier-service.log
  level:
    root: INFO
    com.monprojet.supplier: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  # Configuration PostgreSQL en production (mêmes paramètres de démo)
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false


