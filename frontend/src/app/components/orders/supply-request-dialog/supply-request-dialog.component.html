<h2 mat-dialog-title>Demande d'approvisionnement</h2>
<mat-dialog-content>
  <form [formGroup]="requestForm">
    <mat-form-field class="full-width">
      <mat-label>Produit</mat-label>
      <mat-select formControlName="productId" required>
        <mat-option *ngFor="let product of products" [value]="product.id">
          {{ product.name }} ({{ product.sku }})
        </mat-option>
      </mat-select>
      <mat-error *ngIf="requestForm.get('productId')?.hasError('required')">
        Le produit est requis
      </mat-error>
    </mat-form-field>

    <mat-form-field class="full-width">
      <mat-label>Fournisseur</mat-label>
      <mat-select formControlName="supplierId" required>
        <mat-option *ngFor="let supplier of suppliers" [value]="supplier.id">
          {{ supplier.name }}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="requestForm.get('supplierId')?.hasError('required')">
        Le fournisseur est requis
      </mat-error>
    </mat-form-field>

    <mat-form-field class="full-width">
      <mat-label>Quantité souhaitée</mat-label>
      <input matInput type="number" formControlName="quantity" required>
      <mat-error *ngIf="requestForm.get('quantity')?.hasError('required')">
        La quantité est requise
      </mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button (click)="onCancel()">Annuler</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="requestForm.invalid">
    Envoyer la demande
  </button>
</mat-dialog-actions>
