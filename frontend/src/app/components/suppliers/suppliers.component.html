<div class="container">
  <div class="header">
    <h1>Gestion des Fournisseurs</h1>
    <button mat-raised-button color="primary" (click)="openDialog()" *ngIf="isAdmin">
      <mat-icon>add</mat-icon>
      Ajouter un fournisseur
    </button>
  </div>

  <mat-chip color="primary" selected class="readonly-chip" *ngIf="!isAdmin">
    Mode lecture seule
  </mat-chip>

  <mat-card>
    <table mat-table [dataSource]="suppliers" class="full-width-table">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let supplier">{{ supplier.id }}</td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nom</th>
        <td mat-cell *matCellDef="let supplier">{{ supplier.name }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let supplier">{{ supplier.email || '-' }}</td>
      </ng-container>

      <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef>Téléphone</th>
        <td mat-cell *matCellDef="let supplier">{{ supplier.phone || '-' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let supplier">
          <button mat-icon-button color="primary" (click)="openDialog(supplier)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteSupplier(supplier.id!)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card>
</div>
