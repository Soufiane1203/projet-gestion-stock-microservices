<div class="container">
  <div class="header">
    <h1>Gestion des Produits</h1>
    <button mat-raised-button color="primary" (click)="openDialog()" *ngIf="isAdmin">
      <mat-icon>add</mat-icon>
      Ajouter un produit
    </button>
  </div>

  <mat-chip color="primary" selected class="readonly-chip" *ngIf="!isAdmin">
    Mode lecture seule
  </mat-chip>

  <mat-card>
    <table mat-table [dataSource]="products" class="full-width-table">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let product">{{ product.id }}</td>
      </ng-container>

      <ng-container matColumnDef="sku">
        <th mat-header-cell *matHeaderCellDef>SKU</th>
        <td mat-cell *matCellDef="let product">{{ product.sku }}</td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nom</th>
        <td mat-cell *matCellDef="let product">{{ product.name }}</td>
      </ng-container>

      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef>Prix</th>
        <td mat-cell *matCellDef="let product">{{ product.price | number:'1.2-2' }} €</td>
      </ng-container>

      <ng-container matColumnDef="criticalThreshold">
        <th mat-header-cell *matHeaderCellDef>Seuil Critique</th>
        <td mat-cell *matCellDef="let product">{{ product.criticalThreshold }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let product">
          <button mat-icon-button color="primary" (click)="openDialog(product)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteProduct(product.id!)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card>
</div>
